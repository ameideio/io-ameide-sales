name: secret-scan

# Scan every PR and every push to the default branch with TruffleHog.
# Failure is a hard merge signal for leaked credentials.
#
# We invoke a pinned upstream TruffleHog binary directly rather than the
# floating trufflesecurity/trufflehog@main action so the gate remains
# deterministic and auditable.
#   binary:  https://github.com/trufflesecurity/trufflehog (AGPL-3.0)

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  trufflehog:
    name: trufflehog scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so TruffleHog can resolve the requested commit range.
          fetch-depth: 0

      - name: Install trufflehog
        env:
          TRUFFLEHOG_VERSION: 3.95.2
          TRUFFLEHOG_SHA256: fded1c139fe4d3872d9fde65e1428d82d5556d655439e82f492d87ae8d846779
        run: |
          set -euo pipefail
          tarball="trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          cd "${RUNNER_TEMP}"
          curl -fsSLO "https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}/${tarball}"
          echo "${TRUFFLEHOG_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "${tarball}" trufflehog

      - name: Run trufflehog (PR commit range)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/trufflehog" git file://. \
            --since-commit "${BASE_SHA}" \
            --branch "${HEAD_SHA}" \
            --results=verified,unknown \
            --fail \
            --fail-on-scan-errors \
            --no-update \
            --github-actions

      - name: Run trufflehog (push to default branch)
        if: github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/trufflehog" git file://. \
            --since-commit "${BASE_SHA}" \
            --branch "${HEAD_SHA}" \
            --results=verified,unknown \
            --fail \
            --fail-on-scan-errors \
            --no-update \
            --github-actions
